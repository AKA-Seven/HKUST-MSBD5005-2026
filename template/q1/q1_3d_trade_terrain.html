<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q1 3D 时序贸易关系地形图</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
  <script src="./q1_mock_data.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 18% 16%, #183b55 0%, #08111f 45%, #02050c 100%);
      color: #effbff;
      font-family: Inter, "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    #chart {
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: fixed;
      z-index: 5;
      background: rgba(4, 13, 25, 0.74);
      border: 1px solid rgba(120, 216, 255, 0.36);
      border-radius: 14px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .title {
      top: 18px;
      left: 20px;
      width: min(500px, calc(100vw - 40px));
      padding: 14px 16px;
    }

    .title h1 {
      margin: 0 0 6px;
      color: #86ebff;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .title p {
      margin: 0;
      color: #c9eaf8;
      font-size: 12px;
      line-height: 1.55;
    }

    .layers {
      top: 18px;
      right: 20px;
      width: 220px;
      padding: 12px 14px;
      font-size: 12px;
    }

    .layers strong {
      display: block;
      margin-bottom: 8px;
      color: #e3f9ff;
      font-size: 13px;
    }

    .layers label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      color: #dcf7ff;
      cursor: pointer;
      user-select: none;
    }

    .layers input {
      accent-color: #58dfff;
    }

    .controls {
      left: 50%;
      bottom: 20px;
      width: min(760px, calc(100vw - 40px));
      transform: translateX(-50%);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    button {
      border: 1px solid rgba(128, 220, 255, 0.45);
      border-radius: 10px;
      background: rgba(30, 118, 170, 0.22);
      color: #ecfbff;
      padding: 8px 12px;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #42d4ff;
    }

    .time-label {
      min-width: 86px;
      text-align: right;
      color: #8be9ff;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

  </style>
</head>
<body>
  <div id="chart"></div>

  <section class="panel title">
    <h1>企业关系 3D 时序地形图</h1>
    <p>X/Y 平面为固定整数坐标网格，Z 轴为交易关系嵌入映射值；每个整数坐标点都有拟合后的嵌入高度和置信度，曲面颜色从红到绿表示可信度由低到高。</p>
  </section>

  <section class="panel controls">
    <button id="playButton">暂停</button>
    <input id="timeSlider" type="range" min="0" max="7" value="0" step="1" />
    <div id="timeLabel" class="time-label">2025-01</div>
  </section>

  <script>
    const { timeSlices, terrainData } = window.Q1MockData;
    const chart = echarts.init(document.getElementById("chart"));
    const slider = document.getElementById("timeSlider");
    const timeLabel = document.getElementById("timeLabel");
    const playButton = document.getElementById("playButton");
    const transitionMs = 1000;
    const gridSize = 101;
    let currentIndex = 0;
    let playing = true;
    let timer = null;
    let rafId = 0;
    let currentState = buildState(timeSlices[0]);

    slider.max = String(timeSlices.length - 1);
    initChart();
    renderState(currentState);
    startPlayback();

    window.addEventListener("resize", () => chart.resize());

    slider.addEventListener("input", () => {
      currentIndex = Number(slider.value);
      animateTo(currentIndex);
    });

    playButton.addEventListener("click", () => {
      playing = !playing;
      playButton.textContent = playing ? "暂停" : "播放";
      if (playing) startPlayback();
      else window.clearInterval(timer);
    });

    function initChart() {
      chart.setOption({
        animation: true,
        animationDurationUpdate: transitionMs,
        animationEasingUpdate: "linear",
        backgroundColor: "transparent",
        tooltip: {
          borderColor: "rgba(125,220,255,0.48)",
          backgroundColor: "rgba(4,14,27,0.92)",
          textStyle: { color: "#ecfbff" },
          formatter: (params) => {
            const value = params.value || [];
            return [
              `<strong>整数网格地形点</strong>`,
              `X：${Math.round(value[0])}`,
              `Y：${Math.round(value[1])}`,
              `嵌入高度：${value[2].toFixed(2)}`,
              `置信度：${value[3].toFixed(2)}`
            ].join("<br>");
          }
        },
        visualMap: {
          show: true,
          min: 0,
          max: 1,
          dimension: 3,
          right: 28,
          bottom: 112,
          calculable: true,
          text: ["高可信度", "低可信度"],
          textStyle: { color: "#dff8ff" },
          inRange: { color: ["#e94f5d", "#ffc857", "#78f08d"] }
        },
        xAxis3D: {
          name: "公司平面拓扑横坐标",
          min: 0,
          max: 100,
          interval: 20,
          nameGap: 28,
          axisLabel: { show: true, color: "#c6edff", formatter: "{value}", margin: 8 },
          axisTick: { show: true, lineStyle: { color: "rgba(198,237,255,0.72)" } },
          axisLine: { show: true, lineStyle: { color: "rgba(198,237,255,0.82)", width: 2 } },
          splitLine: { show: true, lineStyle: { color: "rgba(170,225,255,0.16)" } },
          nameTextStyle: { show: true, color: "#e6f9ff", fontWeight: 700 }
        },
        yAxis3D: {
          name: "公司平面拓扑纵坐标",
          min: 0,
          max: 100,
          interval: 20,
          nameGap: 28,
          axisLabel: { show: true, color: "#c6edff", formatter: "{value}", margin: 8 },
          axisTick: { show: true, lineStyle: { color: "rgba(198,237,255,0.72)" } },
          axisLine: { show: true, lineStyle: { color: "rgba(198,237,255,0.82)", width: 2 } },
          splitLine: { show: true, lineStyle: { color: "rgba(170,225,255,0.16)" } },
          nameTextStyle: { show: true, color: "#e6f9ff", fontWeight: 700 }
        },
        zAxis3D: {
          name: "交易关系嵌入映射值",
          min: 0,
          max: 180,
          interval: 30,
          nameGap: 26,
          axisLabel: { show: true, color: "#c6edff", formatter: "{value}", margin: 8 },
          axisTick: { show: true, lineStyle: { color: "rgba(198,237,255,0.72)" } },
          axisLine: { show: true, lineStyle: { color: "rgba(198,237,255,0.82)", width: 2 } },
          splitLine: { show: true, lineStyle: { color: "rgba(170,225,255,0.16)" } },
          nameTextStyle: { show: true, color: "#e6f9ff", fontWeight: 700 }
        },
        grid3D: {
          boxWidth: 140,
          boxDepth: 140,
          boxHeight: 92,
          viewControl: {
            projection: "perspective",
            alpha: 38,
            beta: 42,
            distance: 185,
            rotateSensitivity: 1.2,
            zoomSensitivity: 1.1,
            panSensitivity: 0.8
          },
          light: {
            main: { intensity: 1.25, shadow: true, alpha: 38, beta: 28 },
            ambient: { intensity: 0.34 }
          },
          axisPointer: { lineStyle: { color: "#83ecff" } },
          environment: "rgba(0,0,0,0)"
        },
        series: [surfaceSeries([])]
      });
    }

    function startPlayback() {
      window.clearInterval(timer);
      timer = window.setInterval(() => {
        if (!playing) return;
        currentIndex = (currentIndex + 1) % timeSlices.length;
        slider.value = String(currentIndex);
        animateTo(currentIndex);
      }, 2600);
    }

    function animateTo(index) {
      window.cancelAnimationFrame(rafId);
      const target = buildState(timeSlices[index]);
      timeLabel.textContent = timeSlices[index];
      currentState = target;
      renderState(currentState);
    }

    function renderState(state) {
      chart.setOption({
        series: [{
          id: "surface",
          data: state.surface,
          animationDurationUpdate: transitionMs,
          animationEasingUpdate: "linear"
        }]
      }, { notMerge: false, lazyUpdate: false });
    }

    function buildState(timeSlice) {
      const records = terrainData.filter((record) => record.time_slice === timeSlice);
      const surface = buildSurface(records);
      return {
        surface
      };
    }

    function buildSurface(records) {
      const points = [];
      for (let ix = 0; ix < gridSize; ix += 1) {
        for (let iy = 0; iy < gridSize; iy += 1) {
          const x = ix;
          const y = iy;
          let weightedZ = 0;
          let weightedConfidence = 0;
          let totalWeight = 0;
          let dominantWeight = -1;
          let dominantZ = 0;
          let dominantConfidence = 0;

          records.forEach((record) => {
            const dx = x - record.pos_x;
            const dy = y - record.pos_y;
            const distanceSq = dx * dx + dy * dy;
            const weight = Math.exp(-distanceSq / 18);
            weightedZ += record.rel_embedding * weight;
            weightedConfidence += record.confidence * weight;
            totalWeight += weight;
            if (weight > dominantWeight) {
              dominantWeight = weight;
              dominantZ = record.rel_embedding;
              dominantConfidence = record.confidence;
            }
          });

          const smoothZ = totalWeight ? weightedZ / totalWeight : 0;
          const smoothConfidence = totalWeight ? weightedConfidence / totalWeight : 0;
          const z = clamp(90 + ((smoothZ * 0.25 + dominantZ * 0.75) - 90) * 1.45, 0, 180);
          const confidence = clamp(0.5 + ((smoothConfidence * 0.25 + dominantConfidence * 0.75) - 0.5) * 1.75, 0.001, 0.999);
          points.push([x, y, round(z, 3), round(confidence, 3)]);
        }
      }
      return points;
    }

    function surfaceSeries(data) {
      return {
        id: "surface",
        name: "交易关系可信度地形",
        type: "surface",
        coordinateSystem: "cartesian3D",
        dimensions: ["pos_x", "pos_y", "rel_embedding", "confidence"],
        data,
        wireframe: {
          show: false
        },
        shading: "realistic",
        realisticMaterial: {
          roughness: 0.58,
          metalness: 0.04
        },
        itemStyle: {
          opacity: 0.92
        },
        emphasis: { itemStyle: { opacity: 0.95 } }
      };
    }

    function stableXAxis() {
      return {
        name: "公司平面拓扑横坐标",
        min: 0,
        max: 100,
        interval: 20,
        nameGap: 28,
        axisLabel: { show: true, color: "#c6edff", formatter: "{value}" },
        nameTextStyle: { show: true, color: "#e6f9ff" }
      };
    }

    function stableYAxis() {
      return {
        name: "公司平面拓扑纵坐标",
        min: 0,
        max: 100,
        interval: 20,
        nameGap: 28,
        axisLabel: { show: true, color: "#c6edff", formatter: "{value}" },
        nameTextStyle: { show: true, color: "#e6f9ff" }
      };
    }

    function stableZAxis() {
      return {
        name: "交易关系嵌入映射值",
        min: 0,
        max: 180,
        interval: 30,
        nameGap: 26,
        axisLabel: { show: true, color: "#c6edff", formatter: "{value}" },
        nameTextStyle: { show: true, color: "#e6f9ff" }
      };
    }

    function confidenceColor(confidence, alpha) {
      const clamped = Math.max(0, Math.min(1, confidence));
      const r = Math.round(233 + (120 - 233) * clamped);
      const g = Math.round(79 + (240 - 79) * clamped);
      const b = Math.round(93 + (141 - 93) * clamped);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function round(value, digits) {
      const scale = 10 ** digits;
      return Math.round(value * scale) / scale;
    }
  </script>
</body>
</html>
