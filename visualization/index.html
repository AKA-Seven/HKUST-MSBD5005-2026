<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MC2 Route Frequency & Lifecycle Flow</title>
  <script src="./vendor/three.min.js"></script>
  <script src="./data/mc2_3d_data.js"></script>
  <style>
    :root {
      --bg: #06111a;
      --panel: rgba(7, 20, 32, 0.91);
      --line: rgba(132, 183, 220, 0.27);
      --text: #eff8fc;
      --muted: #9eb7c8;
      --accent: #75c3ff;
      --reliable: #47d18c;
      --suspicious: #e4ba52;
      --reject: #ef7168;
      --base: #62a9d6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 75% 12%, rgba(52, 103, 140, 0.42), transparent 34%),
        radial-gradient(circle at 15% 86%, rgba(27, 80, 112, 0.35), transparent 34%),
        var(--bg);
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }
    canvas { display: block; }
    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: min(340px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      backdrop-filter: blur(10px);
    }
    h1 { margin: 0 0 2px; font-size: 17px; letter-spacing: -0.02em; }
    h2 {
      margin: 15px 0 8px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    p, .note {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 10px 0 4px;
      color: var(--muted);
      font-size: 12px;
    }
    select, input, button {
      width: 100%;
      padding: 8px 9px;
      border: 1px solid rgba(117, 195, 255, 0.34);
      border-radius: 8px;
      color: var(--text);
      background: rgba(4, 15, 26, 0.92);
      font-size: 12px;
    }
    input[type="range"] { padding: 0; accent-color: var(--accent); }
    button {
      cursor: pointer;
      background: rgba(117, 195, 255, 0.16);
      font-weight: 650;
    }
    button:hover { background: rgba(117, 195, 255, 0.27); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; margin-top: 8px; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; margin: 9px 0; }
    .stat {
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(16, 37, 54, 0.82);
    }
    .stat strong { display: block; font-size: 15px; }
    .stat span { color: var(--muted); font-size: 11px; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 11px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .bundle {
      padding: 8px;
      margin-bottom: 7px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(16, 37, 54, 0.82);
      cursor: pointer;
    }
    .bundle.active { border-color: var(--accent); }
    .bundle strong { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; }
    .bundle small { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; }
    .details {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      word-break: break-word;
    }
    .details strong { color: var(--text); }
    .footer {
      position: fixed;
      left: 16px;
      bottom: 12px;
      color: rgba(239, 248, 252, 0.62);
      font-size: 11px;
      pointer-events: none;
    }
    .status {
      position: fixed;
      right: 16px;
      bottom: 12px;
      max-width: min(420px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(9, 22, 34, 0.92);
      color: #d8ecfb;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <section class="panel">
    <h1>MC2 航线频率与生命周期流</h1>
    <p>航站点=公司，航线=关系，粒子密度=频率/强度。</p>

    <div class="stats">
      <div class="stat"><strong id="statStations">0</strong><span>stations</span></div>
      <div class="stat"><strong id="statRoutes">0</strong><span>routes</span></div>
      <div class="stat"><strong id="statMode">Route</strong><span>mode</span></div>
    </div>

    <label for="modeSelect">展示模式</label>
    <select id="modeSelect">
      <option value="routes">Route Frequency: 航线频率</option>
      <option value="lifecycle">Lifecycle Flow: D 方案生命周期流</option>
      <option value="hybrid">Hybrid: 航线 + 生命周期异常</option>
    </select>

    <div class="grid">
      <div>
        <label for="bundleSelect">Bundle</label>
        <select id="bundleSelect"></select>
      </div>
      <div>
        <label for="layoutSelect">航站布局</label>
        <select id="layoutSelect">
          <option value="cluster">按行为聚类环形</option>
          <option value="anomaly">按异常高度</option>
          <option value="fish">按鱼类 HS 比例</option>
        </select>
      </div>
    </div>

    <div class="grid">
      <div>
        <label for="scoreRange">最低 bundle 分数: <span id="scoreText">0</span></label>
        <input id="scoreRange" type="range" min="0" max="100" value="0" />
      </div>
      <div>
        <label for="anomalyRange">最低异常分: <span id="anomalyText">0.00</span></label>
        <input id="anomalyRange" type="range" min="0" max="100" value="0" />
      </div>
    </div>

    <div class="grid">
      <div>
        <label for="monthRange">时间上限: <span id="monthText">all</span></label>
        <input id="monthRange" type="range" min="0" max="0" value="0" />
      </div>
      <div>
        <label for="routeLimit">航线数量: <span id="routeLimitText">800</span></label>
        <input id="routeLimit" type="range" min="100" max="1800" step="50" value="800" />
      </div>
    </div>

    <label for="companySearch">聚焦公司</label>
    <input id="companySearch" list="companyList" placeholder="输入公司名并回车" />
    <datalist id="companyList"></datalist>

    <div class="row">
      <button id="playButton">Play</button>
      <button data-camera="map">Map</button>
      <button data-camera="side">Side</button>
      <button data-camera="flow">Flow</button>
    </div>

    <div class="legend">
      <span class="pill"><span class="dot" style="background: var(--base)"></span>base</span>
      <span class="pill"><span class="dot" style="background: var(--reliable)"></span>reliable</span>
      <span class="pill"><span class="dot" style="background: var(--suspicious)"></span>suspicious</span>
      <span class="pill"><span class="dot" style="background: var(--reject)"></span>reject</span>
    </div>

    <h2>Bundle Reliability</h2>
    <div id="bundleCards"></div>
    <div id="details" class="details">点击航站点、航线或生命周期流查看细节。</div>
  </section>

  <div class="footer">drag rotate · wheel zoom</div>
  <div id="status" class="status"></div>

  <script>
    const statusEl = document.getElementById("status");
    const showStatus = (message) => {
      statusEl.style.display = "block";
      statusEl.textContent = message;
    };

    if (!window.THREE) {
      showStatus("Three.js 加载失败。\n请确认 visualization/vendor/three.min.js 存在，或重新复制本地库文件。");
      throw new Error("THREE not loaded");
    }
    if (!window.MC2_3D_DATA) {
      showStatus("数据未加载：缺少 visualization/data/mc2_3d_data.js。\n先运行：\nD:\\AnacondaEnviroment\\envs\\python312\\python.exe visualization\\build_3d_data.py");
      throw new Error("MC2_3D_DATA not loaded");
    }

    const data = window.MC2_3D_DATA;
    if (!Array.isArray(data.routes) || !Array.isArray(data.companies)) {
      showStatus("数据结构不完整：需要 routes 和 companies 字段。请重新运行数据构建脚本。");
      throw new Error("Invalid MC2_3D_DATA");
    }
    const companies = new Map(data.companies.map((company) => [company.id, company]));
    const bundles = new Map(data.bundles.map((bundle) => [bundle.bundle, bundle]));
    const months = data.meta.months;
    const monthIndex = new Map(months.map((month, index) => [month, index]));

    const color = {
      base: 0x62a9d6,
      mixed: 0x75c3ff,
      prediction: 0x75c3ff,
      reliable: 0x47d18c,
      suspicious: 0xe4ba52,
      reject: 0xef7168,
      station: 0xe8f4fb,
      anomaly: 0xff8b6d,
      lifecycle: 0xd7dc72,
      gapFilled: 0x47d18c,
      extended: 0xef7168,
      burst: 0xff8b6d,
      firstSeen: 0x62a9d6,
      lastSeen: 0xe4ba52
    };

    const state = {
      mode: "routes",
      layout: "cluster",
      bundle: "all",
      minScore: 0,
      minAnomaly: 0,
      monthIndex: months.length - 1,
      routeLimit: 800,
      focus: "",
      playing: false,
      timer: null
    };

    const el = {
      mode: document.getElementById("modeSelect"),
      layout: document.getElementById("layoutSelect"),
      bundle: document.getElementById("bundleSelect"),
      score: document.getElementById("scoreRange"),
      anomaly: document.getElementById("anomalyRange"),
      month: document.getElementById("monthRange"),
      routeLimit: document.getElementById("routeLimit"),
      scoreText: document.getElementById("scoreText"),
      anomalyText: document.getElementById("anomalyText"),
      monthText: document.getElementById("monthText"),
      routeLimitText: document.getElementById("routeLimitText"),
      search: document.getElementById("companySearch"),
      companyList: document.getElementById("companyList"),
      details: document.getElementById("details"),
      bundleCards: document.getElementById("bundleCards"),
      statStations: document.getElementById("statStations"),
      statRoutes: document.getElementById("statRoutes"),
      statMode: document.getElementById("statMode"),
      play: document.getElementById("playButton")
    };

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x06111a, 520, 1100);

    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 2200);
    camera.position.set(0, 330, 540);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
    document.body.prepend(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x9fc8e6, 0.72));
    const light = new THREE.DirectionalLight(0xffffff, 1.25);
    light.position.set(200, 360, 250);
    scene.add(light);

    const root = new THREE.Group();
    const particles = [];
    const pickables = [];
    scene.add(root);

    let stationPositions = new Map();
    let orbit = { theta: 0.08, phi: 1.05, radius: 640, target: new THREE.Vector3(0, 0, 0), dragging: false, lastX: 0, lastY: 0 };

    function initControls() {
      el.month.max = String(Math.max(0, months.length - 1));
      el.month.value = String(state.monthIndex);
      el.monthText.textContent = months[state.monthIndex] || "all";

      el.bundle.add(new Option("All routes", "all"));
      el.bundle.add(new Option("Reliable only", "label:reliable"));
      el.bundle.add(new Option("Suspicious only", "label:suspicious"));
      el.bundle.add(new Option("Reject only", "label:reject"));
      for (const bundle of data.bundles) el.bundle.add(new Option(`${bundle.bundle} (${bundle.label})`, bundle.bundle));

      for (const company of data.companies) {
        const option = document.createElement("option");
        option.value = company.id;
        el.companyList.appendChild(option);
      }

      el.mode.addEventListener("change", () => { state.mode = el.mode.value; draw(); });
      el.layout.addEventListener("change", () => { state.layout = el.layout.value; draw(); });
      el.bundle.addEventListener("change", () => { state.bundle = el.bundle.value; draw(); });
      el.score.addEventListener("input", () => { state.minScore = Number(el.score.value); el.scoreText.textContent = state.minScore; draw(); });
      el.anomaly.addEventListener("input", () => { state.minAnomaly = Number(el.anomaly.value) / 100; el.anomalyText.textContent = state.minAnomaly.toFixed(2); draw(); });
      el.month.addEventListener("input", () => { state.monthIndex = Number(el.month.value); el.monthText.textContent = months[state.monthIndex]; draw(); });
      el.routeLimit.addEventListener("input", () => { state.routeLimit = Number(el.routeLimit.value); el.routeLimitText.textContent = state.routeLimit; draw(); });
      el.search.addEventListener("change", () => { state.focus = el.search.value.trim(); draw(); focusCamera(); });
      el.play.addEventListener("click", togglePlay);
      document.querySelectorAll("[data-camera]").forEach((button) => button.addEventListener("click", () => setCamera(button.dataset.camera)));

      window.addEventListener("resize", onResize);
      renderer.domElement.addEventListener("pointerdown", (event) => { orbit.dragging = true; orbit.lastX = event.clientX; orbit.lastY = event.clientY; });
      renderer.domElement.addEventListener("pointerup", () => { orbit.dragging = false; });
      renderer.domElement.addEventListener("pointermove", onPointerMove);
      renderer.domElement.addEventListener("wheel", (event) => {
        orbit.radius = Math.max(180, Math.min(1200, orbit.radius + event.deltaY * 0.45));
        updateCamera();
      });
      renderer.domElement.addEventListener("click", pickObject);

      renderBundleCards();
    }

    function passBundle(route) {
      if (state.bundle === "all") return true;
      if (state.bundle.startsWith("label:")) return route.label === state.bundle.split(":")[1];
      return route.bundles?.includes(state.bundle);
    }

    function passRoute(route) {
      if (!passBundle(route)) return false;
      if ((route.score || 0) < state.minScore && route.predictedCount > 0) return false;
      if (route.months?.length && route.months.every((month) => (monthIndex.get(month) ?? 0) > state.monthIndex)) return false;
      const source = companies.get(route.source);
      const target = companies.get(route.target);
      if (!source || !target) return false;
      if (Math.max(source.anomaly_score || 0, target.anomaly_score || 0) < state.minAnomaly) return false;
      if (state.focus && route.source !== state.focus && route.target !== state.focus) return false;
      return true;
    }

    function companyScore(company) {
      return (company.anomaly_score || 0) * 1000
        + (company.suspicious_revival_score || 0) * 60
        + Math.log10((company.total_links || 0) + 1) * 20;
    }

    function visibleRoutes() {
      return data.routes
        .filter(passRoute)
        .sort((a, b) => (b.predictedCount - a.predictedCount) || (b.baseCount - a.baseCount) || (b.score - a.score))
        .slice(0, state.routeLimit);
    }

    function visibleCompanies(routes) {
      const ids = new Set();
      routes.forEach((route) => { ids.add(route.source); ids.add(route.target); });
      data.lifecycleFlows.forEach((flow) => {
        const company = companies.get(flow.company);
        if ((company?.anomaly_score || 0) >= state.minAnomaly && (!state.focus || flow.company === state.focus)) ids.add(flow.company);
      });
      return [...ids].map((id) => companies.get(id)).filter(Boolean).sort((a, b) => companyScore(b) - companyScore(a));
    }

    function computeStationPositions(companyList) {
      stationPositions = new Map();
      const clusters = new Map();
      companyList.forEach((company) => {
        const key = state.layout === "cluster" ? company.hierarchical_cluster : 0;
        if (!clusters.has(key)) clusters.set(key, []);
        clusters.get(key).push(company);
      });

      const clusterKeys = [...clusters.keys()].sort((a, b) => Number(a) - Number(b));
      clusterKeys.forEach((clusterKey, clusterIndex) => {
        const members = clusters.get(clusterKey).sort((a, b) => companyScore(b) - companyScore(a));
        const ringRadius = state.layout === "cluster" ? 115 + 34 * clusterIndex : 220;
        members.forEach((company, index) => {
          const angle = (index / Math.max(1, members.length)) * Math.PI * 2 + clusterIndex * 0.33;
          let y = 8 + 95 * (company.anomaly_score || 0);
          if (state.layout === "fish") y = 12 + 140 * (company.fish_hscode_ratio || 0);
          if (state.layout === "anomaly") y = 8 + 170 * (company.anomaly_score || 0);
          stationPositions.set(company.id, new THREE.Vector3(Math.cos(angle) * ringRadius, y, Math.sin(angle) * ringRadius));
        });
      });
    }

    function clearScene() {
      while (root.children.length) {
        const child = root.children.pop();
        child.traverse?.((object) => {
          object.geometry?.dispose?.();
          if (Array.isArray(object.material)) object.material.forEach((material) => material.dispose?.());
          else object.material?.dispose?.();
        });
      }
      particles.length = 0;
      pickables.length = 0;
    }

    function routeColor(route) {
      if (route.label === "reliable") return color.reliable;
      if (route.label === "suspicious") return color.suspicious;
      if (route.label === "reject") return color.reject;
      if (route.kind === "base") return color.base;
      return color.mixed;
    }

    function makeArc(start, end, lift) {
      const mid = start.clone().add(end).multiplyScalar(0.5);
      mid.y += lift;
      return new THREE.QuadraticBezierCurve3(start, mid, end);
    }

    function addStation(company) {
      const position = stationPositions.get(company.id);
      if (!position) return;
      const radius = 2.3 + 5.5 * Math.min(1, company.anomaly_score || 0);
      const geometry = new THREE.SphereGeometry(radius, 18, 12);
      const material = new THREE.MeshStandardMaterial({
        color: company.id === state.focus ? 0xffffff : ((company.anomaly_score || 0) > 0.75 ? color.anomaly : color.station),
        emissive: company.id === state.focus ? 0x75c3ff : 0x000000,
        emissiveIntensity: company.id === state.focus ? 0.7 : 0.08,
        roughness: 0.55
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(position);
      mesh.userData = { type: "station", company };
      root.add(mesh);
      pickables.push(mesh);
    }

    function addRoute(route) {
      const source = stationPositions.get(route.source);
      const target = stationPositions.get(route.target);
      if (!source || !target) return;
      const distance = source.distanceTo(target);
      const lift = 32 + Math.min(180, distance * 0.22 + Math.sqrt(route.count || 1) * 10 + (route.score || 0) * 0.6);
      const curve = makeArc(source, target, lift);
      const points = curve.getPoints(36);
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: routeColor(route),
        transparent: true,
        opacity: route.label === "reliable" ? 0.72 : route.kind === "base" ? 0.24 : 0.52
      });
      const line = new THREE.Line(geometry, material);
      line.userData = { type: "route", route };
      root.add(line);
      pickables.push(line);

      const particleCount = route.label === "reliable" ? Math.min(8, 1 + Math.ceil(route.predictedCount / 2)) : Math.min(4, Math.ceil((route.predictedCount || route.baseCount || 1) / 6));
      for (let i = 0; i < particleCount; i += 1) {
        const particle = new THREE.Mesh(
          new THREE.SphereGeometry(route.label === "reliable" ? 1.8 : 1.25, 10, 8),
          new THREE.MeshBasicMaterial({ color: routeColor(route), transparent: true, opacity: 0.92 })
        );
        particle.userData = { curve, offset: i / particleCount, speed: 0.0015 + Math.min(0.006, (route.count || 1) / 9000), type: "particle", route };
        particles.push(particle);
        root.add(particle);
      }
    }

    function addGround() {
      const grid = new THREE.GridHelper(520, 26, 0x24506c, 0x18384f);
      grid.position.y = -2;
      root.add(grid);
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(86, 258, 96),
        new THREE.MeshBasicMaterial({ color: 0x153348, transparent: true, opacity: 0.18, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI / 2;
      root.add(ring);
    }

    function drawRoutes() {
      const routes = visibleRoutes();
      const companyList = visibleCompanies(routes);
      computeStationPositions(companyList);
      addGround();
      routes.forEach(addRoute);
      companyList.forEach(addStation);
      el.statStations.textContent = companyList.length.toLocaleString();
      el.statRoutes.textContent = routes.length.toLocaleString();
      el.statMode.textContent = "Route";
    }

    function stagePosition(stage, month, company, lane) {
      const stageIndex = { firstSeen: 0, lastSeen: 1, gapFilled: 2, extended: 3, burst: 4 }[stage] ?? 0;
      const x = -210 + stageIndex * 105;
      const z = -150 + lane * 6;
      const y = 10 + 120 * (company?.anomaly_score || 0) + (monthIndex.get(month) || 0) * 0.45;
      return new THREE.Vector3(x, y, z);
    }

    function addLifecycleLabel(stage, x) {
      const geometry = new THREE.BoxGeometry(2, 70, 2);
      const material = new THREE.MeshBasicMaterial({ color: color[stage] || color.lifecycle, transparent: true, opacity: 0.28 });
      const marker = new THREE.Mesh(geometry, material);
      marker.position.set(x, 42, -175);
      root.add(marker);
    }

    function addLifecycleFlow(flow, lane) {
      const company = companies.get(flow.company);
      if (!company) return;
      const start = stagePosition(flow.sourceStage, flow.sourceMonth, company, lane);
      const end = stagePosition(flow.targetStage, flow.targetMonth, company, lane);
      const mid = start.clone().add(end).multiplyScalar(0.5);
      mid.y += 18 + 16 * (flow.value || 1);
      const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
      const points = curve.getPoints(34);
      const geometry = new THREE.TubeGeometry(curve, 28, Math.min(2.6, 0.45 + flow.value * 0.18), 7, false);
      const material = new THREE.MeshBasicMaterial({
        color: color[flow.targetStage] || color.lifecycle,
        transparent: true,
        opacity: 0.34 + Math.min(0.38, flow.value / 18)
      });
      const tube = new THREE.Mesh(geometry, material);
      tube.userData = { type: "flow", flow };
      root.add(tube);
      pickables.push(tube);

      for (const point of [points[0], points[points.length - 1]]) {
        const node = new THREE.Mesh(
          new THREE.SphereGeometry(2.4 + Math.min(4, flow.value * 0.25), 12, 8),
          new THREE.MeshStandardMaterial({ color: color[flow.targetStage] || color.lifecycle, emissive: color[flow.targetStage] || color.lifecycle, emissiveIntensity: 0.2 })
        );
        node.position.copy(point);
        node.userData = { type: "flow", flow };
        root.add(node);
        pickables.push(node);
      }
    }

    function drawLifecycle() {
      const flows = data.lifecycleFlows
        .filter((flow) => {
          const company = companies.get(flow.company);
          if (!company) return false;
          if (state.focus && flow.company !== state.focus) return false;
          return (company.anomaly_score || 0) >= state.minAnomaly;
        })
        .slice(0, state.mode === "hybrid" ? 120 : 520);
      ["firstSeen", "lastSeen", "gapFilled", "extended", "burst"].forEach((stage, index) => addLifecycleLabel(stage, -210 + index * 105));
      flows.forEach((flow, index) => addLifecycleFlow(flow, index - flows.length / 2));
      el.statStations.textContent = new Set(flows.map((flow) => flow.company)).size.toLocaleString();
      el.statRoutes.textContent = flows.length.toLocaleString();
      el.statMode.textContent = "Flow";
    }

    function draw() {
      clearScene();
      if (state.mode === "lifecycle") {
        drawLifecycle();
      } else if (state.mode === "hybrid") {
        drawRoutes();
        drawLifecycle();
      } else {
        drawRoutes();
      }
      renderBundleCards();
      updateCamera();
    }

    function renderBundleCards() {
      el.bundleCards.innerHTML = "";
      data.bundles.forEach((bundle) => {
        const card = document.createElement("div");
        card.className = `bundle ${state.bundle === bundle.bundle ? "active" : ""}`;
        card.innerHTML = `<strong><span>${bundle.bundle}</span><span>${Math.round(bundle.score)}</span></strong>
          <small>${bundle.label} · ML ${Number(bundle.ml_link_probability || 0).toFixed(3)} · links ${bundle.link_count}</small>`;
        card.addEventListener("click", () => {
          state.bundle = bundle.bundle;
          state.mode = "routes";
          el.bundle.value = bundle.bundle;
          el.mode.value = "routes";
          draw();
        });
        el.bundleCards.appendChild(card);
      });
    }

    function showDetails(payload) {
      if (payload.type === "station") {
        const company = payload.company;
        el.details.innerHTML = `<strong>${company.id}</strong><br>
          Anomaly ${Number(company.anomaly_score || 0).toFixed(3)} · Revival ${company.suspicious_revival_score || 0}<br>
          Links ${Number(company.total_links || 0).toLocaleString()} · Partners ${Number(company.partner_count || 0).toLocaleString()} · HS ${Number(company.hscode_count || 0).toLocaleString()}<br>
          Fish HS ratio ${Number(company.fish_hscode_ratio || 0).toFixed(3)} · Cluster ${company.hierarchical_cluster}<br>
          Similar to ${company.nearest_company || "-"} (${Number(company.nearest_similarity || 0).toFixed(3)})<br>
          Extended ${(company.extended_months || []).join(", ") || "-"} · Burst ${(company.burst_months || []).join(", ") || "-"}`;
      } else if (payload.type === "route") {
        const route = payload.route;
        el.details.innerHTML = `<strong>${route.source} → ${route.target}</strong><br>
          Kind ${route.kind} · Label ${route.label}<br>
          Count ${route.count} · Base ${route.baseCount} · Predicted ${route.predictedCount}<br>
          Bundles ${(route.bundles || []).join(", ") || "-"}<br>
          Score ${Number(route.score || 0).toFixed(1)} · ML ${Number(route.mlProbability || 0).toFixed(3)}<br>
          Months ${(route.months || []).join(", ") || "-"}`;
      } else if (payload.type === "flow") {
        const flow = payload.flow;
        el.details.innerHTML = `<strong>${flow.company}</strong><br>
          ${flow.sourceStage} (${flow.sourceMonth}) → ${flow.targetStage} (${flow.targetMonth})<br>
          Flow value ${Number(flow.value || 0).toFixed(2)} · Anomaly ${Number(flow.anomaly_score || 0).toFixed(3)} · Revival ${flow.suspicious_revival_score}`;
      }
    }

    function pickObject(event) {
      const mouse = new THREE.Vector2((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
      const raycaster = new THREE.Raycaster();
      raycaster.params.Line.threshold = 4;
      raycaster.setFromCamera(mouse, camera);
      const hit = raycaster.intersectObjects(pickables, true)[0];
      if (hit?.object?.userData) {
        const payload = hit.object.userData;
        if (payload.company?.id) {
          state.focus = payload.company.id;
          el.search.value = state.focus;
        }
        showDetails(payload);
      }
    }

    function togglePlay() {
      state.playing = !state.playing;
      el.play.textContent = state.playing ? "Pause" : "Play";
      if (state.timer) clearInterval(state.timer);
      if (state.playing) {
        state.timer = setInterval(() => {
          state.monthIndex = (state.monthIndex + 1) % months.length;
          el.month.value = String(state.monthIndex);
          el.monthText.textContent = months[state.monthIndex];
          draw();
        }, 900);
      }
    }

    function setCamera(kind) {
      if (kind === "map") orbit = { ...orbit, theta: 0.001, phi: 0.38, radius: 620 };
      if (kind === "side") orbit = { ...orbit, theta: Math.PI / 2, phi: 1.2, radius: 590 };
      if (kind === "flow") orbit = { ...orbit, theta: 0, phi: 1.15, radius: 500 };
      updateCamera();
    }

    function focusCamera() {
      if (state.focus && stationPositions.has(state.focus)) {
        orbit.target.copy(stationPositions.get(state.focus));
        orbit.radius = 260;
      } else {
        orbit.target.set(0, 0, 0);
      }
      updateCamera();
    }

    function updateCamera() {
      const x = orbit.target.x + orbit.radius * Math.sin(orbit.phi) * Math.sin(orbit.theta);
      const y = orbit.target.y + orbit.radius * Math.cos(orbit.phi);
      const z = orbit.target.z + orbit.radius * Math.sin(orbit.phi) * Math.cos(orbit.theta);
      camera.position.set(x, y, z);
      camera.lookAt(orbit.target);
    }

    function onPointerMove(event) {
      if (!orbit.dragging) return;
      const dx = event.clientX - orbit.lastX;
      const dy = event.clientY - orbit.lastY;
      orbit.lastX = event.clientX;
      orbit.lastY = event.clientY;
      orbit.theta -= dx * 0.006;
      orbit.phi = Math.max(0.18, Math.min(Math.PI - 0.12, orbit.phi + dy * 0.005));
      updateCamera();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      particles.forEach((particle) => {
        const t = (particle.userData.offset + now * particle.userData.speed * 0.001) % 1;
        particle.position.copy(particle.userData.curve.getPointAt(t));
      });
      renderer.render(scene, camera);
    }

    initControls();
    setCamera("map");
    draw();
    animate();
  </script>
</body>
</html>
